<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Sweetheart’s Classroom 🐜💖🦈</title>
    <style>
        :root { --primary: #ff7675; --secondary: #fab1a0; --bg: #fff5f5; }
        body { font-family: 'Sarabun', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 500px; text-align: center; display: flex; flex-direction: column; }
        .audio-btn { background: var(--secondary); border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; color: white; margin: 10px auto; display: block; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .menu-box { margin-bottom: 10px; width: 100%; }
        select { padding: 12px; border-radius: 12px; border: 2px solid var(--primary); font-size: 1rem; width: 100%; background: white; outline: none; }
        .card-container { perspective: 1000px; width: 100%; height: 280px; cursor: pointer; margin: 10px auto; }
        .card { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 25px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; box-shadow: 0 8px 20px rgba(0,0,0,0.05); border: 4px solid white; }
        .card-front { background: white; color: #2d3436; }
        .card-back { background: var(--primary); color: white; transform: rotateY(180deg); }
        .thai-word { font-size: 3.2rem; font-weight: bold; color: var(--primary); margin: 0; }
        #input-area { display:none; margin: 15px 0; }
        input { padding: 12px; border-radius: 12px; border: 2px solid var(--primary); width: 70%; font-size: 1.2rem; text-align: center; outline: none; }
        #trace-container { display:none; position: relative; width: 100%; max-width: 480px; height: 350px; margin: 15px auto; background: #fff; border: 3px dashed var(--primary); border-radius: 20px; touch-action: none; }
        #trace-text { position: absolute; width: 100%; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 8rem; color: #f2f2f2; user-select: none; pointer-events: none; font-weight: bold; opacity: 0.8; letter-spacing: 5px; }
        canvas { position: absolute; top:0; left:0; width: 100%; height: 100%; border-radius: 20px; }
        .controls { display: flex; gap: 10px; width: 100%; margin-top: 5px; }
        .controls button { flex: 1; padding: 15px; border: none; border-radius: 15px; background: white; color: var(--primary); font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #eee; font-size: 1rem; }
        .btn-clear { background: #636e72; color: white; padding: 10px 20px; border-radius: 12px; border: none; margin-top: 10px; cursor: pointer; font-weight: bold; width: 100%; }
        #progress { color: #b2bec3; margin-top: 15px; font-size: 0.85rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: var(--primary); margin: 5px 0 0 0;">鲨鱼的教室 🦈</h1>
    <p style="color: #b2bec3; font-size: 0.9rem; margin-bottom: 5px;">Shāyú de jiàoshì</p>

    <button class="audio-btn" onclick="speak(event)">🔊</button>

    <div class="menu-box">
        <select id="modeSelect" onchange="changeMode()">
            <option value="flashcard">🎴 Flashcards</option>
            <option value="dictation">✍️ Tracing Practice</option>
            <option value="quiz">❓ Quiz Mode</option>
        </select>
    </div>

    <div class="menu-box">
        <select id="categorySelect" onchange="filterCategory()">
            <option value="all">All Categories</option>
            <option value="ความรัก">❤️ Love</option>
            <option value="ทั่วไป">😊 General</option>
            <option value="อาหาร">🍲 Food</option>
        </select>
    </div>

    <div id="card-area" class="card-container" onclick="flipCard()">
        <div class="card" id="card">
            <div class="card-face card-front">
                <h1 class="thai-word" id="th-word">Loading...</h1>
                <p id="zh-read" style="color:#636e72; margin-top: 10px;">Reading...</p>
            </div>
            <div class="card-face card-back">
                <div id="zh-mean" style="font-size: 2.2rem; font-weight:bold; margin-bottom:10px;">...</div>
                <div id="ex-zh" style="font-size: 1rem; opacity: 0.9; line-height: 1.4;"></div>
            </div>
        </div>
    </div>

    <div id="trace-container">
        <div id="trace-text"></div>
        <canvas id="paintCanvas"></canvas>
    </div>

    <div id="input-area">
        <input type="text" id="userInput" placeholder="Translate to Thai...">
        <button onclick="checkAnswer()" style="padding: 12px 20px; background:var(--primary); color:white; border:none; border-radius:12px; margin-left:5px; font-weight:bold;">Check</button>
        <p id="feedback" style="font-weight:bold; margin-top:10px;"></p>
    </div>

    <div id="clear-area" style="display:none; margin-bottom: 10px;">
        <button class="btn-clear" onclick="clearCanvas()">Clear Drawing</button>
    </div>
    
    <div class="controls">
        <button onclick="prevCard()">❮ Back</button>
        <button onclick="nextCard()">Next ❯</button>
    </div>

    <p id="progress"></p>
</div>

        {cat:"ความรัก", th:"จริงใจ", zr:"Jing-Jai", zm:"真心", q_zh:"ฉัน____ (真心)", ex_zh:"รักเธอด้วยความจริงใจ"},
        {cat:"ความรัก", th:"แต่งงาน", zr:"Tàeng-Ngaan", zm:"結婚", q_zh:"____กันนะ (結婚)", ex_zh:"เรามาแต่งงานกันนะ"},

        {cat:"อาหาร", th:"อิ่มแล้ว", zr:"Ìm-Láew", zm:"飽了", q_zh:"ฉัน____ (飽了)", ex_zh:"กินไม่ไหวแล้ว อิ่มแล้ว"},
        {cat:"อาหาร", th:"น้ำแข็งเปล่า", zr:"Nám-Kǎeng-Plào", zm:"冰塊", q_zh:"ขอ____ (冰塊)", ex_zh:"ขอน้ำแข็งเปล่าแก้วหนึ่ง"},
        {cat:"อาหาร", th:"ไม่เผ็ด", zr:"Mâi-Pèt", zm:"不辣", q_zh:"เอาแบบ____ (不辣)", ex_zh:"สั่งส้มตำไม่เผ็ด"},
        {cat:"อาหาร", th:"เป็ด", zr:"Pèt", zm:"鴨", q_zh:"____ย่าง (鴨)", ex_zh:"เป็ดย่างอร่อยมาก"},
        {cat:"อาหาร", th:"เนื้อวัว", zr:"Néua-Wua", zm:"牛肉", q_zh:"ไม่กิน____ (牛肉)", ex_zh:"ก๋วยเตี๋ยวเนื้อวัว"},
        {cat:"อาหาร", th:"ข้าวเหนียว", zr:"Kâo-Nǐaw", zm:"糯米", q_zh:"____มะม่วง (糯米)", ex_zh:"ข้าวเหนียวมะม่วง"},

        {cat:"อาหาร", th:"น้ำผลไม้", zr:"Nám-Pǒn-La-Máai", zm:"果汁", q_zh:"ดื่ม____ (果汁)", ex_zh:"น้ำผลไม้ปั่น"},
        {cat:"อาหาร", th:"ของหวาน", zr:"Kǒng-Wǎan", zm:"甜點", q_zh:"กิน____ (甜點)", ex_zh:"กินของคาวแล้วต้องกินของหวาน"},
        {cat:"ทั่วไป", th:"ช่วยด้วย", zr:"Chûay-Duay", zm:"救命/幫幫我", q_zh:"____! (救命)", ex_zh:"ช่วยด้วยครับ มีคนเป็นลม"},

        {cat:"ทั่วไป", th:"โชคดีนะ", zr:"Chôke-Dee-Na", zm:"祝你好運", q_zh:"ขอให้____ (祝好運)", ex_zh:"ไปเที่ยวให้สนุกนะ โชคดีนะ"}
    ];

    let currentVocab = [...allVocab];
    let index = 0;
    let currentMode = 'flashcard';
    let canvas, ctx, drawing = false;

    function initCanvas() {
        canvas = document.getElementById('paintCanvas');
        if (!canvas) return;
        ctx = canvas.getContext('2d');
        const container = document.getElementById('trace-container');
        canvas.width = container.offsetWidth;
        canvas.height = container.offsetHeight;
        ctx.lineWidth = 8;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#ff7675';

        const start = (e) => { drawing = true; draw(e); };
        const end = () => { drawing = false; ctx.beginPath(); };
        const draw = (e) => {
            if (!drawing) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches ? e.touches[0] : e;
            ctx.lineTo(touch.clientX - rect.left, touch.clientY - rect.top);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(touch.clientX - rect.left, touch.clientY - rect.top);
        };

        canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', draw); canvas.addEventListener('mouseup', end);
        canvas.addEventListener('touchstart', start); canvas.addEventListener('touchmove', draw); canvas.addEventListener('touchend', end);
    }

    function updateCard() {
        const item = currentVocab[index];
        if (!item) return;
        document.getElementById('card').classList.remove('is-flipped');
        document.getElementById('feedback').innerText = "";
        document.getElementById('userInput').value = "";
        
        if (currentMode === 'flashcard') {
            document.getElementById('th-word').innerText = item.th;
            document.getElementById('zh-read').innerText = "Pinyin: " + item.zr;
        } else if (currentMode === 'dictation') {
            document.getElementById('trace-text').innerText = item.th;
            clearCanvas();
        } else if (currentMode === 'quiz') {
            document.getElementById('th-word').innerText = item.q_zh;
            document.getElementById('zh-read').innerText = "Translate to Thai";
        }
        document.getElementById('zh-mean').innerText = item.zm;
        document.getElementById('ex-zh').innerText = item.ex_zh;
        document.getElementById('progress').innerText = (index + 1) + " / " + currentVocab.length;
    }

    function changeMode() {
        currentMode = document.getElementById('modeSelect').value;
        const isTrace = (currentMode === 'dictation');
        document.getElementById('card-area').style.display = isTrace ? 'none' : 'block';
        document.getElementById('trace-container').style.display = isTrace ? 'block' : 'none';
        document.getElementById('clear-area').style.display = isTrace ? 'block' : 'none';
        document.getElementById('input-area').style.display = (currentMode === 'quiz') ? 'block' : 'none';
        if (isTrace) setTimeout(initCanvas, 100);
        updateCard();
    }

    function checkAnswer() {
        if (document.getElementById('userInput').value.trim() === currentVocab[index].th) {
            document.getElementById('feedback').innerText = "✅ Correct!";
            document.getElementById('feedback').style.color = "green";
        } else {
            document.getElementById('feedback').innerText = "❌ Try again!";
            document.getElementById('feedback').style.color = "red";
        }
    }

    function flipCard() { if(currentMode === 'flashcard') document.getElementById('card').classList.toggle('is-flipped'); }
    function nextCard() { index = (index + 1) % currentVocab.length; updateCard(); }
    function prevCard() { index = (index - 1 + currentVocab.length) % currentVocab.length; updateCard(); }
    function clearCanvas() { if(ctx) ctx.clearRect(0, 0, canvas.width, canvas.height); }
    
    function filterCategory() {
        const cat = document.getElementById('categorySelect').value;
        currentVocab = (cat === 'all') ? [...allVocab] : allVocab.filter(function(i) { return i.cat === cat; });
        index = 0;
        updateCard();
    }

    function speak(event) {
        event.stopPropagation();
        const msg = new SpeechSynthesisUtterance(currentVocab[index].th);
        msg.lang = 'th-TH';
        msg.rate = 0.7;
        window.speechSynthesis.speak(msg);
    }

    updateCard();
</script>
